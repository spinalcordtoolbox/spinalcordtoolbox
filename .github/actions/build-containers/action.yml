# This action:
# - builds the SCT Docker image from the repository Dockerfile;
# - can load the image locally for downstream steps;
# - can push the image to the registry; and
# - can push the apptainer image to ghcr.io
#
# To use it from this repository, include it in a workflow with the appropriate inputs. For example:
#
# ```yaml
#  - uses: ./.github/actions/build-containers
#    with:
#      tag: "v1.2.3"
#      docker-username: ${{ secrets.DOCKER_USERNAME }}
#      docker-token: ${{ secrets.DOCKER_TOKEN }}
#      ...
# ```
#
# To use it from another repository, reference it with the repository and path. For example:
#
# ```yaml
#  - uses: spinalcordtoolbox/spinalcordtoolbox/.github/actions/build-containers@main
#    with:
#      ...
# ```
#
# See https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-an-action-metadata-file.
name: Build SCT containers
description: |
  Build SCT Docker image from current Dockerfile. SCT repository must
  be checked out in the workflow for this action to work.

# Inputs grouped by purpose:
# - Authentication:
#   - docker-username
#   - docker-token
# - Docker build behavior:
#   - tag
#   - push
#   - load
#   - cache-from-tag
#   - build-args
# - Apptainer packaging:
#   - upload-apptainer
#   - apptainer-token
inputs:
  tag:
    description: "Tag to apply to the built Docker image."
    required: true
  docker-username:
    description: |
      Username for Docker registry authentication.
      NB: this secret needs to be set in the repository settings.
    required: true
  docker-token:
    description: |
      Personal access token for Docker registry authentication.
      NB: adjust the permissions of the token according to the needs of the workflow.
    required: true
  push:
    description: |
      Whether to push the built Docker image to the registry.
      NB: requires authentication secrets to be set in the repository settings.
    required: false
    default: false
  load:
    description: |
      Whether to load the built Docker image into the local Docker instance.
      NB: this is required for building Apptainer images from the built Docker image in subsequent steps.
    required: false
    default: false
  cache-from-tag:
    description: |
      Tag of the Docker image to use as cache source for the build.
      If not provided, the latest release will be used.
    required: false
    default: ""
  build-args:
    description: |
      Build arguments to pass to the Docker build, in the format
      "ARG1=value1 ARG2=value2".
      NB: these will be passed as-is to the `build-args`
    required: false
    default: ""
  upload-apptainer:
    description: |
      Whether to upload the built Apptainer image to ghcr.io.
      NB: the workflow must have write permissions to repository's packages.
    required: false
    default: false
  apptainer-token:
    description: |
      Personal access token for ghcr.io authentication.
      NB: adjust the permissions of the token according to the needs of the workflow.
    required: false
    default: ""

# Outputs grouped by behavior:
# - Always exposed:
#   - image-tag: the Docker tag used for the build.
#   - apptainer-image: the Apptainer tarball name, which is always produced.
# - Only when upload-apptainer is true:
#   - apptainer-artifact: the artifact name used for upload.
outputs:
  image-tag:
    description: "Tag applied to the built Docker image."
    value: ${{ inputs.tag }}
  apptainer-artifact:
    description: |
      If upload-apptainer input is true, the name of the artifact to which
      the Apptainer image was uploaded. Otherwise, an empty string.
    value: ${{ inputs.upload-apptainer == 'true' && format('apptainer-image-{0}', inputs.tag) || '' }}
  apptainer-image:
    description: |
      The filename of the built Apptainer image on ghcr.io. This is the same regardless
      of whether upload-apptainer is true, as the image is built regardless.
    value: ${{ format('sct_apptainer_{0}', inputs.tag) }}

# Composite steps that build the Docker image and, optionally, the Apptainer image.
runs:
  using: "composite"
  steps:
    - name: Extract latest SCT release tag (semver sorted)
      uses: oprypin/find-latest-tag@6957ac556fa6d349727ecabfcaaf9f8e5ee37124 # v1.1.3
      id: sct-latest-release
      if: ${{ inputs.cache-from-tag == '' }}
      with:
        repository: spinalcordtoolbox/spinalcordtoolbox
        releases-only: true
        sort-tags: true
    - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        # NB: these secrets need to be set in the repository settings
        # NB: the Dockerhub token should be set to read-only
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-token }}
    - name: Setup Docker image builder
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        # Versions for buildx and BuildKit required to overstep bug for COPY --chmod using the X flag
        version: v0.34.1
        driver: docker-container
        driver-opts: image=moby/buildkit:v0.28.1
    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        tags: neuropoly/sct:${{ inputs.tag }}
        cache-from: "type=registry,ref=neuropoly/sct:${{ inputs.cache-from-tag || steps.sct-latest-release.outputs.tag }}"
        cache-to: "type=inline"
        build-args: ${{ inputs.build-args }}
    - name: Maximize build space for apptainer build
      shell: bash
      run: |
        echo "-- Dotnet"
        sudo rm -rf /usr/share/dotnet
        echo "-- Android"
        sudo rm -rf /usr/local/lib/android
        echo "-- Haskell"
        sudo rm -rf /opt/ghc
        echo "-- CodeQL"
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        df -h
    - name: Setup Apptainer image builder
      uses: eWaterCycle/setup-apptainer@3f706d898c9db585b1d741b4692e66755f3a1b40 # v2.0.0
    - name: Build Apptainer image from Docker image
      shell: bash
      run: |
        apptainer build sct_apptainer_${{ inputs.tag }}.sif docker-daemon:neuropoly/sct:${{ inputs.tag }}
    - name: Upload apptainer image
      shell: bash
      if: ${{ inputs.upload-apptainer == 'true' }}
      run: |
        echo "${{ inputs.apptainer-token }}" | apptainer registry login -u "${{ github.actor }}" --password-stdin oras://ghcr.io
        apptainer push sct_apptainer_${{ inputs.tag }}.sif oras://ghcr.io/spinalcordtoolbox/sct:${{ inputs.tag }}
